# ===== Aplicacao =====
spring.application.name=loja-web

# ===== Banco de dados H2 (em memoria) =====
spring.datasource.url=jdbc:h2:mem:lojadb;DB_CLOSE_DELAY=-1
spring.datasource.driver-class-name=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=

# Console web do H2: http://localhost:8080/h2-console
spring.h2.console.enabled=true
spring.h2.console.path=/h2-console

# ===== JPA / Hibernate =====
# create-drop: recria o schema a cada execucao (ideal para a demonstracao)
spring.jpa.hibernate.ddl-auto=create-drop
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.open-in-view=false

# ===== Servidor =====
server.port=8080
