# ===== Aplicacao =====
spring.application.name=loja-web

# ===== Banco de dados H2 (em arquivo - persistente) =====
# Os dados ficam em ./data/lojadb.mv.db e sobrevivem a reinicializacoes.
spring.datasource.url=jdbc:h2:file:./data/lojadb
spring.datasource.driver-class-name=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=

# Console web do H2: http://localhost:8080/h2-console
spring.h2.console.enabled=true
spring.h2.console.path=/h2-console

# ===== JPA / Hibernate =====
# update: mantem o schema e os dados entre execucoes (cria/ajusta tabelas se preciso)
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.open-in-view=false

# ===== Internacionalizacao (i18n) =====
spring.messages.basename=messages
spring.messages.encoding=UTF-8

# ===== Upload de imagens (multipart) =====
spring.servlet.multipart.max-file-size=5MB
spring.servlet.multipart.max-request-size=60MB

# ===== Cliente REST (T8) - URL base da REST-API consumida via RestClient =====
app.api.base-url=http://localhost:8080

# ===== Servidor =====
server.port=8080
