<!DOCTYPE html>
<html lang="pt-br" xmlns:th="http://www.thymeleaf.org"
      xmlns:sec="http://www.thymeleaf.org/extras/spring-security">
<head th:replace="~{fragments/layout :: head(#{produtos.titulo})}"></head>
<body>
<nav th:replace="~{fragments/layout :: navbar}"></nav>

<main class="container">
    <h1 th:text="#{produtos.titulo}">Catalogo de produtos</h1>

    <!-- Filtros (R4): nome + categoria + faixa de preco -->
    <form method="get" th:action="@{/produtos}" class="toolbar">
        <label>
            <span th:text="#{produtos.filtro.nome}">Nome</span>
            <input type="text" name="nome" th:value="${nome}"/>
        </label>
        <label>
            <span th:text="#{produtos.filtro.categoria}">Categoria</span>
            <select name="categoriaId">
                <option value="" th:text="#{produtos.todasCategorias}">Todas</option>
                <option th:each="cat : ${categorias}" th:value="${cat.id}" th:text="${cat.nome}"
                        th:selected="${categoriaId != null and categoriaId == cat.id}">Categoria</option>
            </select>
        </label>
        <label>
            <span th:text="#{produtos.filtro.precoMin}">Preco minimo</span>
            <input type="number" step="0.01" min="0" name="precoMin" th:value="${precoMin}"/>
        </label>
        <label>
            <span th:text="#{produtos.filtro.precoMax}">Preco maximo</span>
            <input type="number" step="0.01" min="0" name="precoMax" th:value="${precoMax}"/>
        </label>
        <button type="submit" th:text="#{produtos.filtrar}">Filtrar</button>
        <a class="btn secondary" th:href="@{/produtos}" th:text="#{produtos.limpar}">Limpar</a>
    </form>

    <table>
        <thead>
        <tr>
            <th th:text="#{produtos.col.id}">#</th>
            <th th:text="#{produtos.col.imagem}">Imagem</th>
            <th th:text="#{produtos.col.nome}">Nome</th>
            <th th:text="#{produtos.col.descricao}">Descricao</th>
            <th th:text="#{produtos.col.categoria}">Categoria</th>
            <th th:text="#{produtos.col.preco}">Preco</th>
            <th th:text="#{produtos.col.estoque}">Estoque</th>
            <th sec:authorize="hasRole('CLIENTE')" th:text="#{produtos.col.acoes}">Acoes</th>
        </tr>
        </thead>
        <tbody>
        <tr th:each="p : ${produtos}">
            <td th:text="${p.id}">1</td>
            <td>
                <span th:with="ids=${imagensPorProduto.get(p.id)}">
                    <img th:each="imgId : ${ids}" th:src="@{/produtos/imagens/{id}(id=${imgId})}"
                         alt="img" style="height:48px; margin:2px; border:1px solid #ddd; border-radius:3px"/>
                    <span th:if="${ids == null or ids.isEmpty()}" class="muted">—</span>
                </span>
            </td>
            <td th:text="${p.nome}">Produto</td>
            <td th:text="${p.descricao}">Descricao</td>
            <td th:text="${p.categoria != null ? p.categoria.nome : '-'}">Categoria</td>
            <td th:text="${#numbers.formatDecimal(p.preco, 1, 2)}">0,00</td>
            <td th:text="${p.estoque}">0</td>
            <td sec:authorize="hasRole('CLIENTE')">
                <form th:action="@{/carrinho/adicionar}" method="post" class="actions"
                      th:if="${p.estoque > 0}">
                    <input type="hidden" name="produtoId" th:value="${p.id}"/>
                    <input type="number" name="quantidade" value="1" min="1" th:max="${p.estoque}"
                           style="width:70px"/>
                    <button type="submit" th:text="#{produtos.adicionar}">Adicionar</button>
                </form>
                <span th:unless="${p.estoque > 0}" class="muted" th:text="#{produtos.semEstoque}">Sem estoque</span>
            </td>
        </tr>
        <tr th:if="${#lists.isEmpty(produtos)}">
            <td colspan="8" class="vazio" th:text="#{produtos.vazio}">Nenhum produto encontrado.</td>
        </tr>
        </tbody>
    </table>
</main>
</body>
</html>
