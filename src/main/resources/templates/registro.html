<!DOCTYPE html>
<html lang="pt-br" xmlns:th="http://www.thymeleaf.org">
<head th:replace="~{fragments/layout :: head(#{registro.titulo})}"></head>
<body>
<nav th:replace="~{fragments/layout :: navbar}"></nav>

<main class="container narrow">
    <h1 th:text="#{registro.titulo}">Cadastro de cliente</h1>

    <form th:action="@{/registro}" th:object="${cliente}" method="post">
        <label>
            <span th:text="#{registro.nome}">Nome</span>
            <input type="text" th:field="*{nome}"/>
            <small class="erro" th:if="${#fields.hasErrors('nome')}" th:errors="*{nome}"></small>
        </label>

        <label>
            <span th:text="#{registro.email}">E-mail</span>
            <input type="email" th:field="*{email}"/>
            <small class="erro" th:if="${#fields.hasErrors('email')}" th:errors="*{email}"></small>
        </label>

        <label>
            <span th:text="#{registro.senha}">Senha</span>
            <input type="password" th:field="*{senha}"/>
            <small class="erro" th:if="${#fields.hasErrors('senha')}" th:errors="*{senha}"></small>
        </label>

        <label>
            <span th:text="#{registro.cpf}">CPF</span>
            <input type="text" th:field="*{cpf}" placeholder="000.000.000-00"/>
            <small class="erro" th:if="${#fields.hasErrors('cpf')}" th:errors="*{cpf}"></small>
        </label>

        <label>
            <span th:text="#{registro.telefone}">Telefone</span>
            <input type="text" th:field="*{telefone}"/>
            <small class="erro" th:if="${#fields.hasErrors('telefone')}" th:errors="*{telefone}"></small>
        </label>

        <label>
            <span th:text="#{registro.sexo}">Sexo</span>
            <select th:field="*{sexo}">
                <option value="" th:text="#{form.selecione}">Selecione...</option>
                <option th:each="s : ${sexos}" th:value="${s}"
                        th:text="#{'sexo.' + ${s}}">Sexo</option>
            </select>
            <small class="erro" th:if="${#fields.hasErrors('sexo')}" th:errors="*{sexo}"></small>
        </label>

        <label>
            <span th:text="#{registro.dataNascimento}">Data de nascimento</span>
            <input type="date" th:field="*{dataNascimento}"/>
            <small class="erro" th:if="${#fields.hasErrors('dataNascimento')}" th:errors="*{dataNascimento}"></small>
        </label>

        <button type="submit" th:text="#{registro.enviar}">Cadastrar</button>
    </form>

    <p class="muted">
        <span th:text="#{registro.jaTemConta}">Ja tem conta?</span>
        <a th:href="@{/login}" th:text="#{registro.entre}">Entre</a>
    </p>
</main>
</body>
</html>
