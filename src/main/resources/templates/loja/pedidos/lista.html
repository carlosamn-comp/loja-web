<!DOCTYPE html>
<html lang="pt-br" xmlns:th="http://www.thymeleaf.org">
<head th:replace="~{fragments/layout :: head(#{loja.pedidos.titulo})}"></head>
<body>
<nav th:replace="~{fragments/layout :: navbar}"></nav>
<nav th:replace="~{fragments/layout :: lojabar}"></nav>

<main class="container">
    <h1 th:text="#{loja.pedidos.titulo}">Minhas vendas</h1>

    <div th:if="${ok != null}" class="alert ok" th:text="#{${ok}}">Ok</div>
    <div th:if="${erro != null}" class="alert erro" th:text="#{${erro}}">Erro</div>

    <p th:if="${#lists.isEmpty(pedidos)}" class="vazio" th:text="#{loja.pedidos.vazio}">Sem vendas.</p>

    <table th:unless="${#lists.isEmpty(pedidos)}">
        <thead>
        <tr>
            <th th:text="#{pedidos.col.id}">Pedido</th>
            <th th:text="#{pedidos.col.data}">Data</th>
            <th th:text="#{admin.pedidos.cliente}">Cliente</th>
            <th th:text="#{pedidos.col.itens}">Itens</th>
            <th th:text="#{pedidos.col.total}">Total</th>
            <th th:text="#{pedidos.col.status}">Status</th>
            <th th:text="#{admin.pedidos.novoStatus}">Novo status</th>
        </tr>
        </thead>
        <tbody>
        <tr th:each="p : ${pedidos}">
            <td th:text="${p.id}">1</td>
            <td th:text="${#temporals.format(p.data, 'dd/MM/yyyy HH:mm')}">data</td>
            <td th:text="${p.cliente.nome}">Cliente</td>
            <td>
                <span th:each="item, it : ${p.itens}">
                    <span th:text="${item.quantidade} + 'x ' + ${item.produto.nome} + ' (' + ${item.produto.loja.nome} + ')'">item</span><span th:if="${!it.last}">, </span>
                </span>
            </td>
            <td th:text="'R$ ' + ${#numbers.formatDecimal(p.total, 1, 2)}">R$ 0,00</td>
            <td>
                <span class="badge" th:classappend="${p.status}" th:text="#{'status.' + ${p.status}}">Status</span>
            </td>
            <td>
                <form th:action="@{/loja/pedidos/{id}/status(id=${p.id})}" method="post" class="actions">
                    <select name="novoStatus">
                        <option th:each="s : ${statusList}" th:value="${s}"
                                th:text="#{'status.' + ${s}}" th:selected="${p.status == s}">Status</option>
                    </select>
                    <button type="submit" th:text="#{admin.pedidos.atualizar}">Atualizar</button>
                </form>
            </td>
        </tr>
        </tbody>
    </table>
</main>
</body>
</html>
