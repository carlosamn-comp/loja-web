<!DOCTYPE html>
<html lang="pt-br" xmlns:th="http://www.thymeleaf.org">
<head th:replace="~{fragments/layout :: head(#{carrinho.titulo})}"></head>
<body>
<nav th:replace="~{fragments/layout :: navbar}"></nav>

<main class="container">
    <h1 th:text="#{carrinho.titulo}">Meu carrinho</h1>

    <div th:if="${ok != null}" class="alert ok" th:text="#{${ok}}">Ok</div>
    <div th:if="${erroEstoque != null}" class="alert erro"
         th:text="#{erro.estoqueInsuficiente(${erroEstoque})}">Estoque insuficiente</div>

    <p th:if="${#lists.isEmpty(itens)}" class="vazio" th:text="#{carrinho.vazio}">Carrinho vazio.</p>

    <div th:unless="${#lists.isEmpty(itens)}">
        <table>
            <thead>
            <tr>
                <th th:text="#{carrinho.produto}">Produto</th>
                <th th:text="#{carrinho.preco}">Preco unitario</th>
                <th th:text="#{carrinho.qtd}">Quantidade</th>
                <th th:text="#{carrinho.subtotal}">Subtotal</th>
                <th th:text="#{crud.acoes}">Acoes</th>
            </tr>
            </thead>
            <tbody>
            <tr th:each="item : ${itens}">
                <td th:text="${item.produto.nome}">Produto</td>
                <td th:text="${#numbers.formatDecimal(item.produto.preco, 1, 2)}">0,00</td>
                <td th:text="${item.quantidade}">1</td>
                <td th:text="${#numbers.formatDecimal(item.subtotal, 1, 2)}">0,00</td>
                <td>
                    <form th:action="@{/carrinho/remover}" method="post">
                        <input type="hidden" name="produtoId" th:value="${item.produto.id}"/>
                        <button type="submit" class="danger" th:text="#{carrinho.remover}">Remover</button>
                    </form>
                </td>
            </tr>
            </tbody>
            <tfoot>
            <tr>
                <th colspan="3" th:text="#{carrinho.total}">Total</th>
                <th colspan="2" th:text="'R$ ' + ${#numbers.formatDecimal(total, 1, 2)}">R$ 0,00</th>
            </tr>
            </tfoot>
        </table>

        <div class="actions" style="margin-top:1rem">
            <a class="btn secondary" th:href="@{/produtos}" th:text="#{carrinho.continuar}">Continuar comprando</a>
            <form th:action="@{/checkout}" method="post">
                <button type="submit" th:text="#{carrinho.finalizar}">Finalizar compra</button>
            </form>
        </div>
    </div>
</main>
</body>
</html>
