<!DOCTYPE html>
<html lang="pt-br" xmlns:th="http://www.thymeleaf.org">
<head th:replace="~{fragments/layout :: head(#{admin.lojas.titulo})}"></head>
<body>
<nav th:replace="~{fragments/layout :: navbar}"></nav>
<nav th:replace="~{fragments/layout :: adminbar}"></nav>

<main class="container">
    <h1 th:text="#{admin.lojas.titulo}">Gestao de lojas</h1>

    <p><a class="btn" th:href="@{/admin/lojas/novo}" th:text="#{crud.novo}">Novo</a></p>

    <table>
        <thead>
        <tr>
            <th>#</th>
            <th th:text="#{loja.nome}">Nome</th>
            <th th:text="#{loja.email}">E-mail</th>
            <th th:text="#{loja.cnpj}">CNPJ</th>
            <th th:text="#{crud.acoes}">Acoes</th>
        </tr>
        </thead>
        <tbody>
        <tr th:each="l : ${lojas}">
            <td th:text="${l.id}">1</td>
            <td th:text="${l.nome}">Nome</td>
            <td th:text="${l.email}">email</td>
            <td th:text="${l.cnpj}">CNPJ</td>
            <td class="actions">
                <a class="btn" th:href="@{/admin/lojas/{id}/editar(id=${l.id})}"
                   th:text="#{crud.editar}">Editar</a>
                <form th:action="@{/admin/lojas/{id}/excluir(id=${l.id})}" method="post"
                      th:onsubmit="'return confirm(\'' + #{crud.confirmaExcluir} + '\');'">
                    <button type="submit" class="danger" th:text="#{crud.excluir}">Excluir</button>
                </form>
            </td>
        </tr>
        <tr th:if="${#lists.isEmpty(lojas)}">
            <td colspan="5" class="vazio" th:text="#{produtos.vazio}">Vazio</td>
        </tr>
        </tbody>
    </table>
</main>
</body>
</html>
