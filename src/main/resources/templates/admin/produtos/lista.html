<!DOCTYPE html>
<html lang="pt-br" xmlns:th="http://www.thymeleaf.org">
<head th:replace="~{fragments/layout :: head(#{admin.produtos.titulo})}"></head>
<body>
<nav th:replace="~{fragments/layout :: navbar}"></nav>
<nav th:replace="~{fragments/layout :: adminbar}"></nav>

<main class="container">
    <h1 th:text="#{admin.produtos.titulo}">Gestao de produtos</h1>

    <p><a class="btn" th:href="@{/admin/produtos/novo}" th:text="#{crud.novo}">Novo</a></p>

    <table>
        <thead>
        <tr>
            <th>#</th>
            <th th:text="#{produto.nome}">Nome</th>
            <th th:text="#{produto.categoria}">Categoria</th>
            <th th:text="#{produto.preco}">Preco</th>
            <th th:text="#{produto.estoque}">Estoque</th>
            <th th:text="#{crud.acoes}">Acoes</th>
        </tr>
        </thead>
        <tbody>
        <tr th:each="p : ${produtos}">
            <td th:text="${p.id}">1</td>
            <td th:text="${p.nome}">Nome</td>
            <td th:text="${p.categoria != null ? p.categoria.nome : '-'}">Categoria</td>
            <td th:text="${#numbers.formatDecimal(p.preco, 1, 2)}">0,00</td>
            <td th:text="${p.estoque}">0</td>
            <td class="actions">
                <a class="btn" th:href="@{/admin/produtos/{id}/editar(id=${p.id})}"
                   th:text="#{crud.editar}">Editar</a>
                <form th:action="@{/admin/produtos/{id}/excluir(id=${p.id})}" method="post"
                      th:onsubmit="'return confirm(\'' + #{crud.confirmaExcluir} + '\');'">
                    <button type="submit" class="danger" th:text="#{crud.excluir}">Excluir</button>
                </form>
            </td>
        </tr>
        <tr th:if="${#lists.isEmpty(produtos)}">
            <td colspan="6" class="vazio" th:text="#{produtos.vazio}">Vazio</td>
        </tr>
        </tbody>
    </table>
</main>
</body>
</html>
