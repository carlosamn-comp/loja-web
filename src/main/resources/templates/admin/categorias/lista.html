<!DOCTYPE html>
<html lang="pt-br" xmlns:th="http://www.thymeleaf.org">
<head th:replace="~{fragments/layout :: head(#{admin.categorias.titulo})}"></head>
<body>
<nav th:replace="~{fragments/layout :: navbar}"></nav>
<nav th:replace="~{fragments/layout :: adminbar}"></nav>

<main class="container">
    <h1 th:text="#{admin.categorias.titulo}">Gestao de categorias</h1>

    <p><a class="btn" th:href="@{/admin/categorias/novo}" th:text="#{crud.novo}">Novo</a></p>

    <table>
        <thead>
        <tr>
            <th>#</th>
            <th th:text="#{categoria.nome}">Nome</th>
            <th th:text="#{categoria.descricao}">Descricao</th>
            <th th:text="#{crud.acoes}">Acoes</th>
        </tr>
        </thead>
        <tbody>
        <tr th:each="c : ${categorias}">
            <td th:text="${c.id}">1</td>
            <td th:text="${c.nome}">Nome</td>
            <td th:text="${c.descricao}">Descricao</td>
            <td class="actions">
                <a class="btn" th:href="@{/admin/categorias/{id}/editar(id=${c.id})}"
                   th:text="#{crud.editar}">Editar</a>
                <form th:action="@{/admin/categorias/{id}/excluir(id=${c.id})}" method="post"
                      th:onsubmit="'return confirm(\'' + #{crud.confirmaExcluir} + '\');'">
                    <button type="submit" class="danger" th:text="#{crud.excluir}">Excluir</button>
                </form>
            </td>
        </tr>
        <tr th:if="${#lists.isEmpty(categorias)}">
            <td colspan="4" class="vazio" th:text="#{produtos.vazio}">Vazio</td>
        </tr>
        </tbody>
    </table>
</main>
</body>
</html>
